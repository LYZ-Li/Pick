services:
  ros2-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ros2_ur5e_dev
    network_mode: "host"
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/root/.Xauthority:rw
      - ../ros2_ws/src:/root/ros2_ws/src:rw
      - ../external_logs:/root/.ros/log:rw
      - /dev/bus/usb:/dev/bus/usb
      - /dev:/dev
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]